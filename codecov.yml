codecov:
  require_ci_to_pass: yes

coverage:
  precision: 2
  round: down
  range: "50...100"

  # Align with SonarCloud exclusions from sonar-project.properties
  ignore:
    - "galaxy_ng/tests/**"
    - "galaxy_ng/app/api/v1/**"
    - "galaxy_ng/contrib/**"
    - "galaxy_ng/social/**"
    - "galaxy_ng/openapi/**"
    - "galaxy_ng/app/access_control/*.py"
    - "galaxy_ng/app/management/**"
    - "galaxy_ng/app/metrics_collection/**"
    - "galaxy_ng/app/migrations/**"
    - "galaxy_ng/app/utils/apispec/**"
    - ".ci/**"

flags:
  unit-tests:
    carryforward: true
    paths:
      - galaxy_ng/

comment:
  layout: "reach,diff,flags,files"
  behavior: default
